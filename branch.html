<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miracle | Branch Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #5f6368;
            --accent-gold: #c5a059;
            --border: #e0e0e0;
            --clock-strip: #e0e4e8;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 1px 1px, #e0e0e0 1px, transparent 0);
            background-size: 32px 32px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
        }

        /* 1. TOP-RIGHT CLOCK */
        .ist-clock {
            position: fixed;
            top: 2rem;
            right: 3.5rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--accent-gold);
            background: var(--clock-strip);
            padding: 6px 14px;
            border-radius: 4px;
            letter-spacing: 1px;
            z-index: 1000;
        }

        /* 2. HEADER SECTION */
        header {
            padding: 4rem 4rem 2rem 4rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .office-title {
            font-family: 'EB Garamond', serif;
            font-size: 2.5rem;
            font-style: italic;
            color: var(--text-primary);
        }

        .office-meta {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-gold);
            margin-top: 5px;
        }

        /* 3. MAIN CONTENT */
        .dashboard-container {
            display: flex;
            gap: 40px;
            padding: 0 4rem 4rem 4rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
        }

        .employee-directory {
            flex: 1.5;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 15px;
        }

        .employee-directory::-webkit-scrollbar { width: 4px; }
        .employee-directory::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .employee-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .employee-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .emp-name {
            font-family: 'EB Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .emp-role {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .emp-details {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-top: 1px solid #f9f9f9;
            padding-top: 15px;
        }

        .pay-grade {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* RIGHT SIDE: BRANDING */
        .info-side {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            border-left: 1px solid var(--border);
        }

        .branding-stack { text-align: center; }
        .miracle-logo {
            font-family: 'Palatino Linotype', serif;
            font-style: italic;
            font-weight: bold;
            color: var(--accent-gold);
            font-size: 3rem;
        }
        .estd {
            font-family: 'EB Garamond', serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .venture-footer {
            font-family: 'Georgia', serif;
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #0B0B45;
            margin-top: auto;
            padding-bottom: 20px;
            text-align: center;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 247, 246, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .pin-box {
            background: var(--card-bg);
            padding: 50px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.05);
        }
        .pin-box input {
            width: 100%;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 10px;
            border: none;
            border-bottom: 1px solid var(--accent-gold);
            outline: none;
            margin-bottom: 30px;
        }
        .btn-pin {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 12px 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-pin:hover { background: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="ist-clock" id="ist-clock">0000:00:00:00:00:00:000</div>

    <header>
        <h1 class="office-title" id="displayBranchName">Loading...</h1>
        <p class="office-meta" id="displayDeptMeta">Please wait</p>
    </header>

    <div class="dashboard-container">
        <div class="employee-directory" id="empList">
            </div>

        <div class="info-side">
            <div class="branding-stack">
                <div class="miracle-logo">Miracle</div>
                <div class="estd">ESTD. 2026</div>
            </div>
            <div class="venture-footer">A Malviya Venture</div>
        </div>
    </div>

    <div class="modal-overlay" id="pinModal">
        <div class="pin-box">
            <h2 id="modalTargetName">Verify Identity</h2>
            <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 20px;">Enter 6-Digit PIN</p>
            <input type="password" maxlength="6" id="pinInput" placeholder="••••••">
            <br>
            <button class="btn-pin" id="confirmPinBtn">Confirm</button>
            <p onclick="closeModal()" style="margin-top: 20px; font-size: 10px; cursor: pointer; color: var(--text-secondary);">Cancel</p>
        </div>
    </div>

    <script type="module">
        (function() {
            const navEntries = performance.getEntriesByType("navigation");
            if (navEntries.length > 0) {
                const navType = navEntries[0].type;
                
                if (navType === 'reload' || navType === 'back_forward') {
                    sessionStorage.clear();
                    window.location.replace('index.html');
                }
            }
        })();
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Use your config from the screenshot
        const firebaseConfig = {
            apiKey: "Your Key",
            authDomain: "Your domain",
            projectId: "Your project ID",
            storageBucket: "Bro just put your details here",
            messagingSenderId: "same",
            appId: "don't even want to write anymore"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedEmployeeData = null;

        async function initDashboard() {
            const bin = sessionStorage.getItem('currentBIN');
            if (!bin) {
                window.location.href = 'index.html'; // Redirect to login if no BIN
                return;
            }

            try {
                // 1. Fetch Branch Info
                const branchRef = doc(db, "branches", bin);
                const branchSnap = await getDoc(branchRef);
                
                if (branchSnap.exists()) {
                    const data = branchSnap.data();
                    document.getElementById('displayBranchName').innerText = data.branchName;
                    document.getElementById('displayDeptMeta').innerText = `Branch ${data.location}`;
                }

                // 2. Fetch Employees
                const empRef = collection(db, "branches", bin, "employees");
                const empSnap = await getDocs(empRef);
                const list = document.getElementById('empList');
                list.innerHTML = '';

                empSnap.forEach((doc) => {
                    const emp = { id: doc.id, ...doc.data() };
                    const card = document.createElement('div');
                    card.className = 'employee-card';
                    card.innerHTML = `
                        <div>
                            <div class="emp-name">${emp.name}</div>
                            <div class="emp-role">${emp.role}</div>
                        </div>
                        <div class="emp-details">
                            <span>ID: ${doc.id.substring(0,5)}</span>
                            <span class="pay-grade">${emp.payGrade}</span>
                        </div>
                    `;
                    card.onclick = () => openPinModal(emp);
                    list.appendChild(card);
                });

            } catch (e) {
                console.error("Error loading dashboard: ", e);
            }
        }

        function openPinModal(emp) {
            selectedEmployeeData = emp;
            document.getElementById('modalTargetName').innerText = emp.name;
            document.getElementById('pinModal').style.display = 'flex';
        }

        window.closeModal = function() {
            document.getElementById('pinModal').style.display = 'none';
            document.getElementById('pinInput').value = '';
        }

        document.getElementById('confirmPinBtn').onclick = function() {
            const inputPin = document.getElementById('pinInput').value;
            if (inputPin === selectedEmployeeData.pin) {
                sessionStorage.setItem('currentEmpID', selectedEmployeeData.id);
                window.location.href = 'attendance.html';
            } else {
                alert("Incorrect PIN. Please try again.");
            }
        };

        // Initialize on load
        initDashboard();

        // 4. Clock Logic (Preserved)
        function updateClock() {
            const now = new Date();
            const istOptions = {
                timeZone: 'Asia/Kolkata', year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            };
            const formatter = new Intl.DateTimeFormat('en-GB', istOptions);
            const parts = formatter.formatToParts(now);
            const d = {};
            parts.forEach(p => d[p.type] = p.value);
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            document.getElementById('ist-clock').textContent = 
                `${d.year}:${d.month}:${d.day}:${d.hour}:${d.minute}:${d.second}:${ms}`;
        }
        setInterval(updateClock, 1);
    </script>
</body>
</html>
