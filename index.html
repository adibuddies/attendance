<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miracle | Attendance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #5f6368;
            --text-tertiary: #0B0B45;
            --accent-gold: #c5a059;
            --border: #e0e0e0;
            --clock-strip: #e0e4e8;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 1px 1px, #e0e0e0 1px, transparent 0);
            background-size: 32px 32px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 1. TOP-RIGHT CLOCK */
        .ist-clock {
            position: absolute;
            top: 2.5rem;
            right: 3.5rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--accent-gold);
            background: var(--clock-strip);
            padding: 6px 14px;
            border-radius: 4px;
            letter-spacing: 1px;
            z-index: 1000;
        }

        /* 2. MAIN CONTAINER */
        .cred-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 960px;
            min-height: 520px;
            display: flex;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.04);
            border-radius: 4px;
            overflow: hidden;
            z-index: 10;
        }

        /* 3. LEFT INTERACTION SIDE */
        .login-side {
            flex: 1.2;
            padding: 60px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border);
        }

        .auth-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3.5px;
            color: var(--text-secondary);
            margin-bottom: 50px;
            font-weight: 500;
        }

        .input-wrapper {
            margin-bottom: 28px;
            position: relative;
        }

        .input-wrapper label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-gold);
            margin-bottom: 10px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid var(--border);
            font-size: 16px;
            background: transparent;
            outline: none;
            transition: var(--transition);
            color: var(--text-primary);
        }

        input:focus { border-bottom-color: var(--accent-gold); }

        #credentialFields {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
        }

        /* 4. BUTTON WITH SMOOTH HOVER */
        .btn-login {
            width: 100%;
            padding: 18px;
            background: #1a1a1a;
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 25px;
        }

        .btn-login:hover {
            background: var(--accent-gold);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
            letter-spacing: 3px;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            font-size: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        .forgot-link:hover { color: var(--accent-gold); }

        /* 5. RIGHT BRANDING SIDE (Refined Positioning) */
        .brand-side {
            flex: 1;
            background: #fafcfc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Initial center for the main logo stack */
            padding: 60px 40px;
            position: relative;
        }

        .logo-stack {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .miracle-logo {
            font-family: 'Palatino Linotype', serif;
            font-style: italic;
            font-weight: bold;
            color: var(--accent-gold);
            font-size: 3.2rem;
            line-height: 1;
            margin-bottom: 6px;
        }

        .estd {
            font-family: 'EB Garamond', serif;
            font-size: 0.55rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .venture-footer {
            font-family: 'Georgia', serif;
            position: absolute;
            bottom: 60px; /* Locked at bottom in footer style */
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        /* 6. SUGGESTIONS LIST */
        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            z-index: 999;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .sugg-item {
            padding: 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f9f9f9;
        }

        .sugg-item:hover { background: #fcf9f4; color: var(--accent-gold); }

    </style>
</head>
<body>

    <div class="ist-clock" id="ist-clock">0000:00:00:00:00:00:000</div>

    <div class="cred-container">
        <div class="login-side">
            <p class="auth-header">Authentication Required</p>
            
            <form id="loginForm">
                <div class="input-wrapper">
                    <label>Office or Department</label>
                    <input type="text" id="officeSearch" placeholder="Enter Department Name" autocomplete="off" required>
                    <div id="suggestions" class="suggestions-list"></div>
                </div>

                <div id="credentialFields">
                    <div class="input-wrapper">
                        <label>Branch. ID</label>
                        <input type="text" id="bidIn" placeholder="e.g. LUCK">
                    </div>

                    <div class="input-wrapper">
                        <label id="codeLabel">BIN / PIN</label>
                        <input type="password" id="password" placeholder="••••" maxlength="6" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                    </div>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">Continue</button>
                <a href="#" class="forgot-link">Forgot your PIN?</a>
            </form>
        </div>

        <div class="brand-side">
            <div class="logo-stack">
                <div class="miracle-logo">Miracle</div>
                <span class="estd">ESTD. 2026</span>
            </div>

            <div class="venture-footer">A Malviya Venture</div>
        </div>
    </div>
    
<script type="module">
    sessionStorage.clear();
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // Your specific Firebase configuration from Screenshot (366)
    const firebaseConfig = {
        apiKey: "Your API KEY goes here",
        authDomain: "Your domain as in config",
        projectId: "Your project ID as in Project Overview>General",
        storageBucket: "<your-project-id.firebasestorage.app",
        messagingSenderId: "enter", //scroll at the bottom of general Project Overview page to find in config files
        appId: "find in config files"
    };

    // Initialize Firebase and Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Clock Logic (Preserved)
    function updateClock() {
        const now = new Date();
        const istOptions = {
            timeZone: 'Asia/Kolkata', year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        };
        const formatter = new Intl.DateTimeFormat('en-GB', istOptions);
        const parts = formatter.formatToParts(now);
        const d = {};
        parts.forEach(p => d[p.type] = p.value);
        const ms = String(now.getMilliseconds()).padStart(3, '0');
        document.getElementById('ist-clock').textContent = 
            `${d.year}:${d.month}:${d.day}:${d.hour}:${d.minute}:${d.second}:${ms}`;
    }
    setInterval(updateClock, 1);

    // 2. Department Filter Data
    const departments = [
        { short: 'Example Corporation', full: 'EXM' },
    ];

    const officeSearch = document.getElementById('officeSearch');
    const suggestionsBox = document.getElementById('suggestions');
    const credentialFields = document.getElementById('credentialFields');
    const submitBtn = document.getElementById('submitBtn');
    let officeSelected = false;

    officeSearch.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        suggestionsBox.innerHTML = '';
        if (val.length < 1) { suggestionsBox.style.display = 'none'; return; }

        const filtered = departments.filter(d => d.short.toLowerCase().includes(val) || d.full.toLowerCase().includes(val));

        if (filtered.length > 0) {
            suggestionsBox.style.display = 'block';
            filtered.forEach(dept => {
                const div = document.createElement('div');
                div.className = 'sugg-item';
                div.innerHTML = `<strong>${dept.short}</strong> — ${dept.full}`;
                div.onclick = () => selectDepartment(dept);
                suggestionsBox.appendChild(div);
            });
        } else { suggestionsBox.style.display = 'none'; }
    });

    function selectDepartment(dept) {
        officeSearch.value = dept.short;
        suggestionsBox.style.display = 'none';
        credentialFields.style.display = 'block';
        setTimeout(() => {
            credentialFields.style.opacity = '1';
            credentialFields.style.transform = 'translateY(0)';
        }, 10);
        submitBtn.innerText = 'Continue';
        officeSelected = true;
    }

    // 3. SERVER-DEPENDENT LOGIN LOGIC
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const code = document.getElementById('password').value;
        const enteredBID = document.getElementById('bidIn').value;
        const enteredOffice = document.getElementById('officeSearch').value;
        const submitBtn = document.getElementById('submitBtn');

        // BIN (Branch Login) = 4 Digits
        if (code.length === 4) {
            submitBtn.innerText = 'Verifying Branch...';
            submitBtn.disabled = true;

            try {
                // Fetch the branch document where Document ID is the BIN
                const branchRef = doc(db, "branches", code);
                const branchSnap = await getDoc(branchRef);

                if (branchSnap.exists()) {
                    const data = branchSnap.data();
                    
                    // Match validation
                    if (data.bid === enteredBID && data.branchName === enteredOffice) {
                        sessionStorage.setItem('currentBIN', code);
                        window.location.href = 'branch.html'; 
                    } else {
                        alert("Credentials mismatch for the selected department/office.");
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Continue';
                    }
                } else {
                    alert("Invalid BIN. Branch not found.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Continue';
                }
            } catch (err) {
                console.error("Login Error:", err);
                alert("Connection error. Please try again.");
                submitBtn.disabled = false;
                submitBtn.innerText = 'Continue';
            }
        } 
        // PIN (Individual Login) = 6 Digits
        else if (code.length === 6) {
            submitBtn.innerText = 'Verifying Identity...';
            // Logic for PIN verification across all branches will be added in Step 2
            alert("Direct PIN login via landing page is in development. Please login via Branch dashboard.");
            submitBtn.innerText = 'Continue';
        } 
        else {
            alert("Please enter a 4-digit BIN or 6-digit PIN.");
        }
    });

    document.addEventListener('click', (e) => {
        if (!officeSearch.contains(e.target)) suggestionsBox.style.display = 'none';
    });
</script>
</body>
</html>
