<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAF9F6;
            --card-bg: #FFFFF0;
            --text-primary: #FFFFFF;
            --text-secondary: #000000;
            --text-tertiary: #0B0B45;
            --accent-gold: #C5A059;
            --border: #E0E0E0;
            --clock-stip: #8686AC;
            --transition: all 0.4s cubic bezier (0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
        }

        .clock { 
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--accent-gold) !important;
            background: var(--clock-strip);
            padding: 5px 12px;
            border-radius: 2px;
        }

        .cred-container { 
            background: var(--bg);
            width: 100%;
            max-width: 960px;
            min-height: 520px;
            display: flex;
            border: 0.4px dashed var(--text-secondary);
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        /* --- LOGIN SIDE of .cred-container --- */

        .login-form { 
            background: var(--card-bg);
            flex: 1.2;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border)
        }

        .input-wrapper {
            margin-bottom: 30px;
            position: relative;
        }

        .input-wrapper label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-gold);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid var(--border);
            font-size: 16px;
            background: transparent;
            outline: none;
            transition: var(--transition);
            color: var(--text-main);
        }

        input:focus { border-bottom-color: var(--accent-gold); }

        .btn-login { 
            background: #8686AC;
            color: var(--text-primary);
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: var(--transition);

        }

        .btn-login:hover {
            background: var(--accent-gold);
            transform: translateY(-2px);
        }

        .forgot-link { 
            display: block;
            text-align: center;
            margin-top: 12px;
            font-size: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color var(--transition);
        }

        .forgot-link:hover { 
            color: var(--accent-gold);
        }

        /* --- BRAND SIDE of .cred-container --- */
        .brand-side { 
            background: #fafdfc;
            border-color: #8686AC;
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .miracle-logo { 
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            font-style: italic;
            font-weight: bold;
            color: var(--accent-gold);
            font-size: 2.2rem;
            margin-left: 25px;
            text-align: center;
        }

        .estd { 
            font-family: 'Georgia', serif;
            font-size: 0.65rem;
            color: var(--text-tertiary);
            display: block;
            margin-top: -4px;
            text-align: left;
            position: relative;
        }

        .venture-mark { 
            font-family: 'Georgia', serif;
            font-size: 0.65rem;
            color: var(--text-tertiary);
            display: block;
            position: absolute;
            text-align: center;
            margin-bottom: 50px;
        }

        /* --- SUGGESTIONS LIST --- */
        .suggestions-list { 
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            z-index: 999;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .sugg-item { 
            padding: 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f9f9f9;
        }

        .sugg-item:hover { 
            background: var(--text-primary);
            color: var(--accent-gold);
        }

        /* Tablet/Mobile tweak */
        @media (max-width: 800px) {
            .cred-container { flex-direction: column; height: auto; }
            .brand-side { order: -1; padding: 60px 20px; }
        }
    </style>
</head>
<body>
    <div class="cred-container">
        <div class="login-form">
            <span class="clock" id="clock">00:00:00</span>
            <p font-size="11px" text-transform="uppercase" letter-spacing="3px" color="#5f6368" margin-bottom="40px" font-weight="900">Login Required</p>

            <form id="loginForm">
                <div class="input-wrapper">
                    <label>Office or Department</label>
                    <input type="text" id="officeSearch" placeholder="Enter Department Name" autocomplete="off" required>
                    <div id="suggestions" class="suggestions-list"></div>
                </div>

                <div id="credentialFields">
                    <div class="input-wrapper">
                        <label>Corp. ID</label>
                        <input type="text" id="empID" placeholder="e.g. 10056">
                    </div>

                    <div class="input-wrapper">
                        <label>PIN</label>
                        <input type="password" id="password" placeholder="••••••">
                    </div>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">Continue</button>
                <a href="#" class="forgot-link">Forgot your PIN?</a>
            </form>
        </div>

        <div class="brand-side">
            <div class="miracle-logo">Miracle</div>
            <div class="estd">Est. 2026</div>
            <div class="venture-footer">A Malviya Venture</div>
        </div>
    </div>

    <script>
        const departments = [
            { short: 'UPSWC', full: 'Uttar Pradesh State Warehousing Corporation', hasLogo: true },
            { short: 'FSSAI', full: 'Food Safety and Standards Authority of India', hasLogo: false },
            { short: 'RBI', full: 'Reserve Bank of India', hasLogo: false },
            { short: 'UPPCL', full: 'UP Power Corporation Limited', hasLogo: false },
            { short: 'GSTN', full: 'Goods and Services Tax Network', hasLogo: false }
        ];

        const officeSearch = document.getElementById('officeSearch');
        const suggestionsBox = document.getElementById('suggestions');
        const credentialFields = document.getElementById('credentialFields');
        const partnerArea = document.getElementById('partnerArea');
        const submitBtn = document.getElementById('submitBtn');
        let officeSelected = false;

        // Intelligent Filter Logic
        officeSearch.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            suggestionsBox.innerHTML = '';
            
            if (val.length < 1) {
                suggestionsBox.style.display = 'none';
                return;
            }

            const filtered = departments.filter(d => 
                d.short.toLowerCase().includes(val) || 
                d.full.toLowerCase().includes(val)
            );

            if (filtered.length > 0) {
                suggestionsBox.style.display = 'block';
                filtered.forEach(dept => {
                    const div = document.createElement('div');
                    div.className = 'sugg-item';
                    div.innerHTML = `<strong>${dept.short}</strong> — ${dept.full}`;
                    div.onclick = () => selectDepartment(dept);
                    suggestionsBox.appendChild(div);
                });
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        function selectDepartment(dept) {
            officeSearch.value = dept.short;
            suggestionsBox.style.display = 'none';
            
            // Show Partner Logo + Separator if it's UPSWC
            if (dept.hasLogo) {
                partnerArea.style.display = 'flex';
            } else {
                partnerArea.style.display = 'none';
            }

            // Reveal hidden fields
            credentialFields.style.display = 'block';
            submitBtn.innerText = 'Sign In';
            officeSelected = true;
        }

        // Form Submission
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!officeSelected) {
                // Check if manually typed input matches a dept
                const typed = officeSearch.value.toUpperCase();
                const match = departments.find(d => d.short === typed);
                if (match) selectDepartment(match);
                else selectDepartment({short: typed, hasLogo: false});
            } else {
                // Here is where you integrate your Firebase auth
                submitBtn.innerText = 'Verifying...';
                setTimeout(() => { window.location.href = 'dash.html'; }, 1000);
            }
        });

        // Click outside to close suggestions
        document.addEventListener('click', (e) => {
            if (!officeSearch.contains(e.target)) suggestionsBox.style.display = 'none';
        });
    </script>
</body>
</html>
